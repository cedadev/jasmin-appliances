---
# This playbook uses the Ansible OpenStack modules to create a cluster
# using a number of baremetal compute node instances, and configure it
# for a SLURM partition
- hosts: openstack
  roles:
    - role: jasmin.cluster-infra
      cluster_groups: "{{ slurm_groups + [cluster_gw] }}"
      cluster_tag: "{{ cluster_type.slurm }}"
  tasks:
    - name: add slurm cluster to nfs_clients group
      add_host:
        name: "{{ item }}"
        groups: 
          - nfs_clients
          - beegfs_clients
          - gluster_clients
      with_items: "{{ groups['cluster'] }}"

- hosts: openstack
  tasks:
    - block:
        - name: Get stack outputs
          os_stack_outputs:
            stack_id: "{{ storage_name }}"
        - name: Export storage information from stack outputs
          set_fact:
            storage_stack_info: "{{ stack_outputs['info'] | select('ne', '') | map('from_json') | selectattr('storage_type', '==', 'nfs') | first }}"
        - debug:
            msg: "{{ storage_stack_info }}"
      when: storage_name is defined

- hosts:
    - cluster
  become: true
  pre_tasks:
    - name: Define variable to access existing storage stack info
      set_fact:
        storage_stack: "{{ (hostvars[groups['openstack'][0]])['storage_stack_info'] }}"
      when: storage_name is defined
   #- import_tasks: cluster-hosts.yml 
    - import_tasks: cluster-firewalld.yml 
  roles:
    - role: resmo.ntp

    # NFS
    - role: stackhpc.cluster-nfs
      nfs_enable:
        server: false
        clients: true
      nfs_server: "{{ storage_stack['nfs_servers'] | first }}"
      nfs_export: "{{ storage_stack['nfs_export'] }}"
      when: storage_stack['storage_type'] == "nfs"

    # BeeGFS
    # Gluster

- hosts:
    - "{{ slurm_name }}_login"
    - "{{ slurm_name }}_compute"
  become: yes
  pre_tasks:

    - name: Ensure user home dir root exists
      file:
        path: "{{ jasmin_homedir }}"
        state: directory
      run_once: true

  roles:
    # Run the user creation once to create the user home directories
    - role: singleplatform-eng.users
      users: "{{ jasmin_users }}"
      groups_to_create: "{{ jasmin_groups }}"
      run_once: true

    # Run the user creation again (without home dir) on all nodes
    - role: singleplatform-eng.users
      users: "{{ jasmin_users }}"
      groups_to_create: "{{ jasmin_groups }}"
      users_create_homedirs: false

        
- hosts:
    - "{{ slurm_name }}_login"
    - "{{ slurm_name }}_compute"
  become: yes
  pre_tasks:

    - name: Ensure the OpenHPC package repo rpm is present
      yum:
        name: "https://github.com/openhpc/ohpc/releases/download/v1.3.GA/ohpc-release-1.3-1.el7.x86_64.rpm"
        state: present

    - name: Ensure latest python is present
      yum:
        name: python
        state: latest

  roles:
    - role: stackhpc.openhpc
      openhpc_enable:
        control: "{{ inventory_hostname in groups[slurm_name + '_login'] }}"
        batch: "{{ inventory_hostname in groups[slurm_name + '_compute'] }}"
        runtime: true
      openhpc_cluster_name: "{{ slurm_name }}"
      openhpc_slurm_partitions: "{{ openhpc_slurm_partitions }}"
      openhpc_slurm_control_host: "{{ groups[slurm_name + '_login'] | first }}"


- hosts: openstack
  roles:
    - role: jasmin.cluster-infra
      cluster_groups: "{{ slurm_groups }}"
      cluster_tag: "{{ cluster_type.slurm }}"
      cluster_stack_update_only: true

  # Hack pending outcome of:
  # - https://github.com/ansible/ansible/pull/53757
  # - https://review.openstack.org/643195
  tasks:
    - name: Fixup stack tags
      command: "openstack stack update --existing --tags {{ cluster_type.slurm }} {{ cluster_name }}"
